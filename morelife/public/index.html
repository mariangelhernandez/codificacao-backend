<section id="agendar" class="booking-section container">
    <div class="form-container">
        <h2>Solicite um Agendamento</h2>
        <form id="formAgendamento">
            <input type="text" id="nome" placeholder="Nome Completo" required>
            <input type="email" id="email" placeholder="Seu melhor e-mail" required>
            <select id="especialidade">
                <option value="Clinico Geral">Clínico Geral</option>
                <option value="Odontologia">Odontologia</option>
                <option value="Cardiologia">Cardiologia</option>
            </select>
            <input type="date" id="data" required>
            <button type="submit" class="btn-submit">Enviar Solicitação</button>
        </form>
        <div id="feedback"></div>
    </div>
</section>

<script src="../js/carousel.js"></script>
<script>
    document.getElementById('formAgendamento').onsubmit = async (e) => {
        e.preventDefault();
        const dados = {
            nome: document.getElementById('nome').value,
            email: document.getElementById('email').value,
            especialidade: document.getElementById('especialidade').value,
            data: document.getElementById('data').value
        };

        try {
            const response = await fetch('/api/agendar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(dados)
            });
            const result = await response.json();
            const feedback = document.getElementById('feedback');
            feedback.innerText = result.message;
            feedback.className = result.success ? 'success' : 'error';
            if(result.success) e.target.reset();
        } catch (err) {
            document.getElementById('feedback').innerText = 'Erro de conexão.';
            document.getElementById('feedback').className = 'error';
            console.error(err);
        }
    };
</script>
